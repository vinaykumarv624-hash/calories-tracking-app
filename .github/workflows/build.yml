name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git unzip zip openjdk-17-jdk zlib1g-dev libncurses-dev libffi-dev libssl-dev autoconf libtool pkg-config m4 cmake libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install cython==0.29.33 buildozer==1.5.0 python-for-android==2023.9.16

      - name: First build pass (builds hostpython3, expected to fail at Kivy step)
        run: |
          yes | buildozer android debug || true

      - name: Create cgi shim file
        run: |
          printf 'import html\ndef escape(s, quote=True):\n    return html.escape(s, quote=quote)\n' > /tmp/cgi_shim.py
          cat /tmp/cgi_shim.py

      - name: Inject cgi shim into hostpython3 stdlib
        run: |
          HOSTPYDIR=$(find .buildozer -type d -path "*hostpython3/native-build/root/usr/local/lib/python3.1*" 2>/dev/null | head -n 1)
          echo "Found hostpython3 stdlib at: $HOSTPYDIR"
          if [ -n "$HOSTPYDIR" ]; then
            cp /tmp/cgi_shim.py "$HOSTPYDIR/cgi.py"
            echo "cgi.py shim copied successfully"
            ls -la "$HOSTPYDIR/cgi.py"
          else
            echo "WARNING: hostpython3 directory not found, shim not injected"
          fi

      - name: Second build pass (should now get past cgi import)
        run: |
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calorietracker-apk
          path: bin/*.apk
