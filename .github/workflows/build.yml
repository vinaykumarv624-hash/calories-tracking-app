name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git unzip zip openjdk-17-jdk zlib1g-dev libncurses-dev libffi-dev libssl-dev autoconf libtool pkg-config m4 cmake libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install cython==0.29.33 buildozer

      - name: First build pass (creates venv, expected to fail at pip self-upgrade)
        run: |
          yes | buildozer android debug || true

      - name: Force clean pip reinstall inside the p4a venv
        run: |
          VENVDIR=$(find .buildozer -type d -path "*build/venv" 2>/dev/null | head -n 1)
          echo "Found p4a venv at: $VENVDIR"
          if [ -n "$VENVDIR" ]; then
            "$VENVDIR/bin/python" -m ensurepip --upgrade
            echo "pip reinstalled cleanly via ensurepip"
            "$VENVDIR/bin/python" -m pip --version
          else
            echo "WARNING: p4a venv not found, skipping pip fix"
          fi

      - name: Second build pass (should now get past pip self-upgrade)
        run: |
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calorietracker-apk
          path: bin/*.apk
